<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4b4b">
<title>Test Oposiciones Biblioteca</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
    background: #0f1116; color: #eee; padding: 16px 12px 90px;
  }
  h1 { font-size: 1.2rem; margin: 4px 0 12px; display: flex; justify-content: space-between; align-items: center; }
  h1 .estado { font-size: .7rem; padding: 4px 8px; border-radius: 20px; font-weight: 600; }
  .estado.on { background: rgba(33,195,84,.2); color: #4ade80; }
  .estado.off { background: rgba(255,75,75,.2); color: #ff8080; }
  .marcador { display: flex; gap: 10px; margin-bottom: 14px; }
  .marcador div { flex: 1; background: #1c1f27; border-radius: 12px; padding: 10px; text-align: center; }
  .marcador .num { font-size: 1.4rem; font-weight: 700; }
  .filtros, .panel { background: #1c1f27; border-radius: 12px; padding: 12px; margin-bottom: 14px; }
  .filtros label, .panel label { display: block; font-size: 0.8rem; color: #9aa0ac; margin: 8px 0 4px; }
  select, input, textarea {
    width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #333;
    background: #11131a; color: #eee; font-size: .95rem;
  }
  select[multiple] { height: 90px; }
  textarea { min-height: 70px; resize: vertical; }
  button {
    border: none; border-radius: 12px; padding: 14px; font-size: 1rem; font-weight: 600;
    cursor: pointer; width: 100%;
  }
  .btn-primario { background: #ff4b4b; color: #fff; margin-top: 8px; }
  .btn-secundario { background: #2a2e38; color: #eee; margin-top: 8px; }
  .btn-peligro { background: #7f1d1d; color: #fff; margin-top: 8px; }
  .btn-peq { padding: 8px 10px; font-size: .8rem; width: auto; }
  .pregunta { font-size: 1.1rem; font-weight: 600; margin: 10px 0 16px; line-height: 1.4; }
  .opciones { display: flex; flex-direction: column; gap: 10px; }
  .tarjeta {
    border: 2px solid #333; border-radius: 14px; padding: 18px 14px; text-align: center;
    font-weight: 600; transition: border-color .2s, background-color .2s;
  }
  .tarjeta.seleccionada { border-color: #ff4b4b; background: rgba(255,75,75,.1); }
  .tarjeta.correcta { border-color: #21c354; background: rgba(33,195,84,.15); }
  .tarjeta.incorrecta { border-color: #ff4b4b; background: rgba(255,75,75,.15); }
  .resultado { margin-top: 14px; padding: 12px; border-radius: 10px; font-size: 0.95rem; }
  .resultado.ok { background: rgba(33,195,84,.15); }
  .resultado.ko { background: rgba(255,75,75,.15); }
  .info-extra { margin-top: 10px; background: #1c1f27; border-radius: 10px; padding: 12px; font-size: .9rem; }
  .barra-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .barra-tabs button { background: #1c1f27; color: #9aa0ac; padding: 10px; flex: 1; min-width: 70px; font-size: .8rem; }
  .barra-tabs button.activo { background: #ff4b4b; color: #fff; }
  .fallo-item, .item-lista { background: #1c1f27; border-radius: 10px; padding: 12px; margin-bottom: 8px; font-size: .9rem; }
  .fallo-item .et { color: #ff8080; }
  .fallo-item .ok { color: #4ade80; }
  .aviso { text-align: center; color: #9aa0ac; padding: 20px 0; }
  footer { color: #6b7280; font-size: .75rem; text-align: center; margin-top: 30px; }
  .fila-btn { display: flex; gap: 10px; }
  .oculta-btn { background: none; border: none; color: #9aa0ac; font-size: .8rem; margin-top: 10px; padding: 4px; width: auto; }
  .item-lista { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .item-lista .titulo { flex: 1; }
  .fila-mini-btn { display: flex; gap: 6px; }
  .modal-fondo {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex;
    align-items: flex-end; justify-content: center; z-index: 50;
  }
  .modal {
    background: #1c1f27; border-radius: 16px 16px 0 0; padding: 18px; width: 100%;
    max-width: 480px; max-height: 85vh; overflow-y: auto;
  }
  .modal h3 { margin-top: 0; }
  .comparativa { background: #11131a; border-radius: 10px; padding: 10px; margin: 8px 0; font-size: .85rem; }
  .comparativa .titulo-comp { color: #9aa0ac; font-size: .75rem; text-transform: uppercase; margin-bottom: 4px; }
  .pendientes-aviso {
    background: rgba(255, 193, 7, .15); color: #ffc107; border-radius: 10px;
    padding: 10px; font-size: .85rem; margin-bottom: 12px; text-align: center;
  }
  .radio-fila { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .radio-fila input { width: auto; }
</style>
</head>
<body>

<h1>📚 Test Oposiciones <span id="estado-conexion" class="estado off">sin conectar</span></h1>

<div class="barra-tabs" id="barra-tabs">
  <button id="tab-test" class="activo">🧪 Test</button>
  <button id="tab-fallos">📉 Fallos</button>
  <button id="tab-admin" style="display:none">🛠️ Admin</button>
  <button id="tab-ajustes">⚙️ Ajustes</button>
</div>

<div id="pendientes-aviso" class="pendientes-aviso" style="display:none"></div>

<div id="vista-test"></div>
<div id="vista-fallos" style="display:none"></div>
<div id="vista-admin" style="display:none"></div>
<div id="vista-ajustes" style="display:none"></div>
<div id="modal-contenedor"></div>

<footer>
  Funciona sin conexión con la última copia sincronizada. Los cambios que
  hagas offline en Administración se guardan y se envían solos cuando
  vuelva la conexión.
</footer>

<script>
/* ============================================================
   ESTADO Y ALMACENAMIENTO LOCAL
   ============================================================ */
const LS_CONFIG = "testopos_config";
const LS_CACHE = "testopos_cache";
const LS_COLA = "testopos_cola";
const LS_STATS = "testopos_stats";
const LS_OCULTAS = "testopos_ocultas";
const LS_FALLOS = "testopos_fallos_local";

function leerLS(clave, porDefecto) {
  try { const v = localStorage.getItem(clave); return v ? JSON.parse(v) : porDefecto; }
  catch (e) { return porDefecto; }
}
function guardarLS(clave, valor) {
  try { localStorage.setItem(clave, JSON.stringify(valor)); } catch (e) {}
}

let config = leerLS(LS_CONFIG, { apiUrl: "", token: "", usuario: "", rol: "" });
let CACHE = leerLS(LS_CACHE, { examenes: [], preguntas: [] });
let cola = leerLS(LS_COLA, []); // operaciones pendientes de sincronizar
let stats = leerLS(LS_STATS, { aciertos: 0, fallos: 0 });
let ocultas = new Set(leerLS(LS_OCULTAS, []));
let fallosLocales = leerLS(LS_FALLOS, []);

let sincronizando = false;

/* ============================================================
   LLAMADAS A LA API
   ============================================================ */
async function api(ruta, metodo = "GET", cuerpo = null) {
  if (!config.apiUrl) throw { tipo: "sin_configurar" };
  const opciones = {
    method: metodo,
    headers: { "Content-Type": "application/json" },
  };
  if (config.token) opciones.headers["Authorization"] = "Bearer " + config.token;
  if (cuerpo !== null) opciones.body = JSON.stringify(cuerpo);

  let respuesta;
  try {
    respuesta = await fetch(config.apiUrl.replace(/\/$/, "") + ruta, opciones);
  } catch (e) {
    throw { tipo: "red" }; // sin conexión, o la API está dormida y tarda
  }
  const texto = await respuesta.text();
  const datos = texto ? JSON.parse(texto) : null;
  if (!respuesta.ok) {
    throw { tipo: "http", status: respuesta.status, detalle: datos };
  }
  return datos;
}

function marcarConectado(conectado) {
  const el = document.getElementById("estado-conexion");
  el.textContent = conectado ? "conectado" : "sin conectar";
  el.className = "estado " + (conectado ? "on" : "off");
}

/* ============================================================
   LOGIN
   ============================================================ */
async function iniciarSesion(usuario, contrasena) {
  const r = await api("/login", "POST", { usuario, contrasena });
  config.token = r.token; config.usuario = r.usuario; config.rol = r.rol;
  guardarLS(LS_CONFIG, config);
  document.getElementById("tab-admin").style.display = config.rol === "admin" ? "block" : "none";
}

function cerrarSesion() {
  config.token = ""; config.usuario = ""; config.rol = "";
  guardarLS(LS_CONFIG, config);
  document.getElementById("tab-admin").style.display = "none";
  renderAjustes();
}

/* ============================================================
   REFRESCO DE CACHÉ (descarga completa desde la API)
   ============================================================ */
async function refrescarCache() {
  const incluirOcultas = config.rol === "admin" ? "?incluir_ocultas=true" : "";
  const datos = await api("/export" + incluirOcultas);
  CACHE = datos;
  guardarLS(LS_CACHE, CACHE);
  marcarConectado(true);
}

/* ============================================================
   COLA DE CAMBIOS PENDIENTES (para cuando no hay conexión)
   ============================================================ */
function encolar(operacion) {
  operacion.id_cola = Date.now() + "-" + Math.random().toString(36).slice(2);
  cola.push(operacion);
  guardarLS(LS_COLA, cola);
  actualizarAvisoPendientes();
}

function actualizarAvisoPendientes() {
  const aviso = document.getElementById("pendientes-aviso");
  if (cola.length) {
    aviso.style.display = "block";
    aviso.textContent = `⏳ ${cola.length} cambio(s) sin sincronizar. Se enviarán solos al recuperar conexión.`;
  } else {
    aviso.style.display = "none";
  }
}

function peticionDeOperacion(op) {
  switch (op.tipo) {
    case "crear_pregunta": return { ruta: "/preguntas", metodo: "POST", cuerpo: op.datos };
    case "editar_pregunta": return { ruta: "/preguntas/" + op.datos_id, metodo: "PUT", cuerpo: op.datos };
    case "eliminar_pregunta": return { ruta: `/preguntas/${op.datos_id}?version_esperada=${op.version_esperada ?? ""}`, metodo: "DELETE" };
    case "crear_examen": return { ruta: "/examenes", metodo: "POST", cuerpo: op.datos };
    case "editar_examen": return { ruta: "/examenes/" + op.datos_id, metodo: "PUT", cuerpo: op.datos };
    case "eliminar_examen": return { ruta: `/examenes/${op.datos_id}?version_esperada=${op.version_esperada ?? ""}`, metodo: "DELETE" };
    case "fallo": return { ruta: "/fallos", metodo: "POST", cuerpo: op.datos };
    case "ocultar": return { ruta: "/ocultar/" + op.datos_id, metodo: "POST" };
  }
}

async function sincronizar() {
  if (sincronizando || !config.apiUrl || !config.token) return;
  sincronizando = true;
  try {
    while (cola.length) {
      const op = cola[0];
      const peticion = peticionDeOperacion(op);
      try {
        await api(peticion.ruta, peticion.metodo, peticion.cuerpo);
        cola.shift();
        guardarLS(LS_COLA, cola);
        actualizarAvisoPendientes();
      } catch (err) {
        if (err.tipo === "http" && err.status === 409) {
          await mostrarConflicto(op, err.detalle);
          return; // el usuario decide; se reintenta sincronizar tras resolver
        }
        if (err.tipo === "http" && err.status === 409 === false) {
          // otro error http (ej. 404 la pregunta ya no existe): descartamos esta operación
        }
        if (err.tipo === "http") {
          cola.shift(); // error irrecuperable (404, validación...): se descarta para no bloquear el resto
          guardarLS(LS_COLA, cola);
          actualizarAvisoPendientes();
          continue;
        }
        marcarConectado(false);
        break; // sin conexión: se reintentará más tarde
      }
    }
    if (!cola.length) {
      await refrescarCache().catch(() => {});
      render();
    }
  } finally {
    sincronizando = false;
  }
}

function mostrarConflicto(op, detalle) {
  return new Promise((resolve) => {
    const cont = document.getElementById("modal-contenedor");
    const servidor = detalle && detalle.servidor ? detalle.servidor : {};
    cont.innerHTML = `
      <div class="modal-fondo"><div class="modal">
        <h3>⚠️ Conflicto al sincronizar</h3>
        <p>Esto ha cambiado en el servidor desde que lo editaste (probablemente desde la web) mientras estabas sin conexión:</p>
        <div class="comparativa">
          <div class="titulo-comp">Versión del servidor (la más reciente)</div>
          ${servidor.texto_pregunta ? "<div>" + escapeHtml(servidor.texto_pregunta) + "</div>" : ""}
          ${servidor.titulo ? "<div>" + escapeHtml(servidor.titulo) + "</div>" : ""}
        </div>
        <div class="comparativa">
          <div class="titulo-comp">Tu versión (sin enviar)</div>
          ${op.datos && op.datos.texto_pregunta ? "<div>" + escapeHtml(op.datos.texto_pregunta) + "</div>" : ""}
          ${op.datos && op.datos.titulo ? "<div>" + escapeHtml(op.datos.titulo) + "</div>" : ""}
        </div>
        <button class="btn-primario" id="btn-sobrescribir">Usar la mía (sobrescribir el servidor)</button>
        <button class="btn-secundario" id="btn-descartar">Descartar mi cambio y quedarme con la del servidor</button>
      </div></div>`;

    document.getElementById("btn-sobrescribir").onclick = async () => {
      cont.innerHTML = "";
      if (op.datos) op.datos.version_esperada = servidor.version;
      op.version_esperada = servidor.version;
      resolve();
      sincronizar();
    };
    document.getElementById("btn-descartar").onclick = async () => {
      cont.innerHTML = "";
      cola.shift();
      guardarLS(LS_COLA, cola);
      actualizarAvisoPendientes();
      resolve();
      sincronizar();
    };
  });
}

function escapeHtml(s) {
  const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML;
}

/* Reintenta sincronizar sola cuando el navegador detecta que hay red */
window.addEventListener("online", sincronizar);

/* ============================================================
   TEST (usa siempre la caché local: funciona offline y online igual)
   ============================================================ */
let filtros = { nivel: [], tipo: [], lugar: [], etiqueta: [] };
let preguntaActual = null, opcionesActuales = [], seleccion = null, corregido = false;

function mapaExamenes() { return Object.fromEntries(CACHE.examenes.map(e => [e.id_examen, e])); }
function valoresUnicos(campo) { return [...new Set(CACHE.examenes.map(e => e[campo]).filter(Boolean))].sort(); }
function etiquetasUnicas() {
  const s = new Set();
  CACHE.preguntas.forEach(p => (p.etiquetas || []).forEach(t => s.add(t)));
  return [...s].sort();
}
function preguntasFiltradas() {
  const mapa = mapaExamenes();
  return CACHE.preguntas.filter(p => {
    if (ocultas.has(p.id_pregunta)) return false;
    if (p.visible === false) return false;
    const ex = mapa[p.id_examen] || {};
    if (filtros.nivel.length && !filtros.nivel.includes(ex.nivel)) return false;
    if (filtros.tipo.length && !filtros.tipo.includes(ex.tipo_biblioteca)) return false;
    if (filtros.lugar.length && !filtros.lugar.includes(ex.lugar)) return false;
    if (filtros.etiqueta.length && !(p.etiquetas || []).some(t => filtros.etiqueta.includes(t))) return false;
    return true;
  });
}
function barajar(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function nuevaPregunta() {
  seleccion = null; corregido = false;
  const disponibles = preguntasFiltradas();
  if (!disponibles.length) { preguntaActual = null; render(); return; }
  preguntaActual = disponibles[Math.floor(Math.random() * disponibles.length)];
  opcionesActuales = barajar(preguntaActual.respuestas);
  render();
}
function seleccionar(idx) { if (!corregido) { seleccion = idx; render(); } }

async function corregir() {
  if (seleccion === null) return;
  corregido = true;
  const elegida = opcionesActuales[seleccion];
  if (elegida.correcta) {
    stats.aciertos++;
  } else {
    stats.fallos++;
    const correcta = opcionesActuales.find(o => o.correcta);
    const fallo = {
      id_pregunta: preguntaActual.id_pregunta,
      texto_pregunta: preguntaActual.texto_pregunta,
      respuesta_elegida: elegida.texto,
      respuesta_correcta: correcta ? correcta.texto : "(sin marcar)",
      fecha: new Date().toLocaleString(),
    };
    fallosLocales.unshift(fallo);
    guardarLS(LS_FALLOS, fallosLocales);
    if (config.token) {
      try { await api("/fallos", "POST", fallo); }
      catch (e) { encolar({ tipo: "fallo", datos: fallo }); }
    }
  }
  guardarLS(LS_STATS, stats);
  render();
}

async function ocultarPregunta() {
  ocultas.add(preguntaActual.id_pregunta);
  guardarLS(LS_OCULTAS, [...ocultas]);
  if (config.token) {
    try { await api("/ocultar/" + preguntaActual.id_pregunta, "POST"); }
    catch (e) { encolar({ tipo: "ocultar", datos_id: preguntaActual.id_pregunta }); }
  }
  nuevaPregunta();
}

function resetMarcador() {
  if (!confirm("¿Reiniciar aciertos y fallos de esta sesión?")) return;
  stats = { aciertos: 0, fallos: 0 };
  guardarLS(LS_STATS, stats);
  render();
}

function crearMultiSelect(id, etiqueta, opciones, campo) {
  const div = document.createElement("div");
  const lab = document.createElement("label"); lab.textContent = etiqueta;
  const sel = document.createElement("select"); sel.multiple = true; sel.id = id;
  opciones.forEach(o => { const opt = document.createElement("option"); opt.value = o; opt.textContent = o; sel.appendChild(opt); });
  sel.addEventListener("change", () => { filtros[campo] = [...sel.selectedOptions].map(o => o.value); });
  div.appendChild(lab); div.appendChild(sel);
  return div;
}

function render() {
  const vista = document.getElementById("vista-test");
  vista.innerHTML = "";
  const marcador = document.createElement("div");
  marcador.className = "marcador";
  marcador.innerHTML = `<div>✅ Aciertos<div class="num">${stats.aciertos}</div></div><div>❌ Fallos<div class="num">${stats.fallos}</div></div>`;
  vista.appendChild(marcador);

  if (!CACHE.preguntas.length) {
    const aviso = document.createElement("div");
    aviso.className = "aviso";
    aviso.textContent = config.apiUrl
      ? "Todavía no has sincronizado ninguna pregunta. Ve a Ajustes y pulsa 'Actualizar datos'."
      : "Configura la API en Ajustes para descargar tus preguntas la primera vez.";
    vista.appendChild(aviso);
    return;
  }

  if (!preguntaActual) {
    const filtrosDiv = document.createElement("div");
    filtrosDiv.className = "filtros";
    filtrosDiv.appendChild(crearMultiSelect("f-nivel", "Nivel", valoresUnicos("nivel"), "nivel"));
    filtrosDiv.appendChild(crearMultiSelect("f-tipo", "Tipo de biblioteca", valoresUnicos("tipo_biblioteca"), "tipo"));
    filtrosDiv.appendChild(crearMultiSelect("f-lugar", "Lugar", valoresUnicos("lugar"), "lugar"));
    filtrosDiv.appendChild(crearMultiSelect("f-etiqueta", "Tema / etiqueta", etiquetasUnicas(), "etiqueta"));
    vista.appendChild(filtrosDiv);

    const btn = document.createElement("button");
    btn.className = "btn-primario"; btn.textContent = "▶️ Empezar test";
    btn.onclick = nuevaPregunta;
    vista.appendChild(btn);

    if (ocultas.size) {
      const btnMostrar = document.createElement("button");
      btnMostrar.className = "btn-secundario";
      btnMostrar.textContent = `Volver a mostrar ${ocultas.size} pregunta(s) ocultas`;
      btnMostrar.onclick = async () => {
        ocultas = new Set(); guardarLS(LS_OCULTAS, []);
        if (config.token) { try { await api("/ocultar", "DELETE"); } catch (e) {} }
        render();
      };
      vista.appendChild(btnMostrar);
    }
    const btnReset = document.createElement("button");
    btnReset.className = "btn-secundario"; btnReset.textContent = "🔄 Reiniciar marcador";
    btnReset.onclick = resetMarcador;
    vista.appendChild(btnReset);
    return;
  }

  const p = document.createElement("div"); p.className = "pregunta"; p.textContent = preguntaActual.texto_pregunta;
  vista.appendChild(p);

  const opsDiv = document.createElement("div"); opsDiv.className = "opciones";
  opcionesActuales.forEach((op, idx) => {
    const t = document.createElement("div");
    let clases = "tarjeta";
    if (corregido) { if (op.correcta) clases += " correcta"; else if (seleccion === idx) clases += " incorrecta"; }
    else if (seleccion === idx) clases += " seleccionada";
    t.className = clases; t.textContent = op.texto;
    if (!corregido) t.onclick = () => seleccionar(idx);
    opsDiv.appendChild(t);
  });
  vista.appendChild(opsDiv);

  const filaBtn = document.createElement("div"); filaBtn.className = "fila-btn";
  if (!corregido) {
    const btnCorregir = document.createElement("button");
    btnCorregir.className = "btn-primario"; btnCorregir.textContent = "✅ Corregir";
    btnCorregir.disabled = seleccion === null; btnCorregir.onclick = corregir;
    filaBtn.appendChild(btnCorregir);
  } else {
    const btnSiguiente = document.createElement("button");
    btnSiguiente.className = "btn-primario"; btnSiguiente.textContent = "➡️ Siguiente";
    btnSiguiente.onclick = nuevaPregunta;
    filaBtn.appendChild(btnSiguiente);
  }
  vista.appendChild(filaBtn);

  if (corregido) {
    const elegida = opcionesActuales[seleccion];
    const res = document.createElement("div");
    if (elegida.correcta) { res.className = "resultado ok"; res.textContent = "¡Correcto! ✅"; }
    else {
      const correcta = opcionesActuales.find(o => o.correcta);
      res.className = "resultado ko";
      res.textContent = "Incorrecto ❌ — Respuesta correcta: " + (correcta ? correcta.texto : "no marcada");
    }
    vista.appendChild(res);
    if (preguntaActual.info_extra) {
      const info = document.createElement("div"); info.className = "info-extra";
      info.textContent = "ℹ️ " + preguntaActual.info_extra;
      vista.appendChild(info);
    }
  }

  const btnOcultar = document.createElement("button");
  btnOcultar.className = "oculta-btn"; btnOcultar.textContent = "🙈 No volver a mostrarme esta pregunta";
  btnOcultar.onclick = ocultarPregunta;
  vista.appendChild(btnOcultar);
}

/* ============================================================
   MIS FALLOS
   ============================================================ */
function renderFallos() {
  const vista = document.getElementById("vista-fallos");
  vista.innerHTML = "";
  if (!fallosLocales.length) { vista.innerHTML = '<p class="aviso">Todavía no has fallado ninguna pregunta. ¡Bien!</p>'; return; }
  const btnBorrar = document.createElement("button");
  btnBorrar.className = "btn-secundario"; btnBorrar.textContent = "🗑️ Borrar historial de fallos";
  btnBorrar.onclick = async () => {
    if (!confirm("¿Borrar todo el historial de fallos?")) return;
    fallosLocales = []; guardarLS(LS_FALLOS, fallosLocales);
    if (config.token) { try { await api("/fallos", "DELETE"); } catch (e) {} }
    renderFallos();
  };
  vista.appendChild(btnBorrar);
  fallosLocales.forEach(f => {
    const div = document.createElement("div"); div.className = "fallo-item";
    div.innerHTML = `<strong>${escapeHtml(f.texto_pregunta)}</strong><br>
      <span class="et">Tu respuesta: ${escapeHtml(f.respuesta_elegida)}</span><br>
      <span class="ok">Correcta: ${escapeHtml(f.respuesta_correcta)}</span><br>
      <small>${escapeHtml(f.fecha)}</small>`;
    vista.appendChild(div);
  });
}

/* ============================================================
   ADMINISTRACIÓN
   ============================================================ */
function renderAdmin() {
  const vista = document.getElementById("vista-admin");
  vista.innerHTML = "";
  if (config.rol !== "admin") { vista.innerHTML = '<p class="aviso">Necesitas iniciar sesión como admin en Ajustes.</p>'; return; }

  const btnNuevoExamen = document.createElement("button");
  btnNuevoExamen.className = "btn-primario"; btnNuevoExamen.textContent = "➕ Nuevo examen";
  btnNuevoExamen.onclick = () => formularioExamen(null);
  vista.appendChild(btnNuevoExamen);

  CACHE.examenes.forEach(ex => {
    const div = document.createElement("div"); div.className = "item-lista";
    const nPreguntas = CACHE.preguntas.filter(p => p.id_examen === ex.id_examen).length;
    div.innerHTML = `<div class="titulo"><strong>${escapeHtml(ex.titulo || ex.id_examen)}</strong><br><small>${escapeHtml(ex.lugar || "")} · ${ex.anio || ""} · ${nPreguntas} preg.</small></div>`;
    const fila = document.createElement("div"); fila.className = "fila-mini-btn";
    const btnEditar = document.createElement("button"); btnEditar.className = "btn-secundario btn-peq"; btnEditar.textContent = "Editar";
    btnEditar.onclick = () => formularioExamen(ex);
    const btnPreguntas = document.createElement("button"); btnPreguntas.className = "btn-secundario btn-peq"; btnPreguntas.textContent = "Preguntas";
    btnPreguntas.onclick = () => listaPreguntasExamen(ex.id_examen);
    fila.appendChild(btnEditar); fila.appendChild(btnPreguntas);
    div.appendChild(fila);
    vista.appendChild(div);
  });
}

function listaPreguntasExamen(idExamen) {
  const vista = document.getElementById("vista-admin");
  vista.innerHTML = "";
  const btnVolver = document.createElement("button"); btnVolver.className = "btn-secundario"; btnVolver.textContent = "⬅️ Volver a exámenes";
  btnVolver.onclick = renderAdmin;
  vista.appendChild(btnVolver);
  const btnNueva = document.createElement("button"); btnNueva.className = "btn-primario"; btnNueva.textContent = "➕ Nueva pregunta";
  btnNueva.onclick = () => formularioPregunta(null, idExamen);
  vista.appendChild(btnNueva);

  CACHE.preguntas.filter(p => p.id_examen === idExamen).forEach(p => {
    const div = document.createElement("div"); div.className = "item-lista";
    div.innerHTML = `<div class="titulo">${escapeHtml(p.texto_pregunta.slice(0, 60))}${p.texto_pregunta.length > 60 ? "…" : ""}${p.visible === false ? " <small>(oculta)</small>" : ""}</div>`;
    const btnEditar = document.createElement("button"); btnEditar.className = "btn-secundario btn-peq"; btnEditar.textContent = "Editar";
    btnEditar.onclick = () => formularioPregunta(p, idExamen);
    div.appendChild(btnEditar);
    vista.appendChild(div);
  });
}

function formularioExamen(examen) {
  const vista = document.getElementById("vista-admin");
  vista.innerHTML = "";
  const panel = document.createElement("div"); panel.className = "panel";
  const campos = ["id_examen", "titulo", "organismo", "tipo_biblioteca", "lugar", "anio", "nivel"];
  const valores = {};
  campos.forEach(c => {
    const lab = document.createElement("label"); lab.textContent = c;
    const inp = document.createElement("input");
    inp.value = examen ? (examen[c] ?? "") : "";
    if (c === "id_examen" && examen) inp.disabled = true;
    inp.oninput = () => valores[c] = inp.value;
    valores[c] = inp.value;
    panel.appendChild(lab); panel.appendChild(inp);
  });
  vista.appendChild(panel);

  const btnGuardar = document.createElement("button"); btnGuardar.className = "btn-primario";
  btnGuardar.textContent = examen ? "💾 Guardar cambios" : "💾 Crear examen";
  btnGuardar.onclick = async () => {
    const cuerpo = { ...valores, anio: valores.anio ? parseInt(valores.anio) : null };
    if (examen) cuerpo.version_esperada = examen.version;
    await guardarExamen(examen, cuerpo);
  };
  vista.appendChild(btnGuardar);

  if (examen) {
    const btnBorrar = document.createElement("button"); btnBorrar.className = "btn-peligro";
    btnBorrar.textContent = "🗑️ Eliminar examen (y todas sus preguntas)";
    btnBorrar.onclick = async () => {
      if (!confirm("¿Seguro? Se borrarán también todas sus preguntas.")) return;
      CACHE.examenes = CACHE.examenes.filter(e => e.id_examen !== examen.id_examen);
      CACHE.preguntas = CACHE.preguntas.filter(p => p.id_examen !== examen.id_examen);
      guardarLS(LS_CACHE, CACHE);
      if (config.token) {
        try { await api(`/examenes/${examen.id_examen}?version_esperada=${examen.version}`, "DELETE"); }
        catch (e) { if (e.tipo !== "http" || e.status !== 409) encolar({ tipo: "eliminar_examen", datos_id: examen.id_examen, version_esperada: examen.version }); else { await mostrarConflicto({ tipo: "eliminar_examen", datos_id: examen.id_examen }, e.detalle); } }
      } else {
        encolar({ tipo: "eliminar_examen", datos_id: examen.id_examen, version_esperada: examen.version });
      }
      renderAdmin();
    };
    vista.appendChild(btnBorrar);
  }

  const btnCancelar = document.createElement("button"); btnCancelar.className = "btn-secundario"; btnCancelar.textContent = "Cancelar";
  btnCancelar.onclick = renderAdmin;
  vista.appendChild(btnCancelar);
}

async function guardarExamen(examenExistente, cuerpo) {
  // actualiza la caché local al momento (optimista), y envía a la API (o encola si falla)
  if (examenExistente) {
    Object.assign(examenExistente, cuerpo);
  } else {
    CACHE.examenes.push({ ...cuerpo, version: 1 });
  }
  guardarLS(LS_CACHE, CACHE);

  const tipo = examenExistente ? "editar_examen" : "crear_examen";
  if (config.token) {
    try {
      await api(examenExistente ? "/examenes/" + cuerpo.id_examen : "/examenes", examenExistente ? "PUT" : "POST", cuerpo);
    } catch (e) {
      if (e.tipo === "http" && e.status === 409) { await mostrarConflicto({ tipo, datos: cuerpo, datos_id: cuerpo.id_examen }, e.detalle); }
      else { encolar({ tipo, datos: cuerpo, datos_id: cuerpo.id_examen }); }
    }
  } else {
    encolar({ tipo, datos: cuerpo, datos_id: cuerpo.id_examen });
  }
  renderAdmin();
}

function formularioPregunta(pregunta, idExamen) {
  const vista = document.getElementById("vista-admin");
  vista.innerHTML = "";
  const panel = document.createElement("div"); panel.className = "panel";

  const labP = document.createElement("label"); labP.textContent = "Enunciado";
  const txtP = document.createElement("textarea"); txtP.value = pregunta ? pregunta.texto_pregunta : "";
  panel.appendChild(labP); panel.appendChild(txtP);

  const letras = ["A", "B", "C", "D"];
  const inputsRespuesta = {};
  let correctaSeleccionada = pregunta ? (pregunta.respuestas.find(r => r.correcta) || {}).letra : "A";

  letras.forEach(letra => {
    const lab = document.createElement("label"); lab.textContent = "Respuesta " + letra;
    const inp = document.createElement("input");
    const existente = pregunta ? pregunta.respuestas.find(r => r.letra === letra) : null;
    inp.value = existente ? existente.texto : "";
    inputsRespuesta[letra] = inp;
    const filaRadio = document.createElement("div"); filaRadio.className = "radio-fila";
    const radio = document.createElement("input"); radio.type = "radio"; radio.name = "correcta"; radio.value = letra;
    radio.checked = correctaSeleccionada === letra;
    radio.onchange = () => correctaSeleccionada = letra;
    const labelRadio = document.createElement("span"); labelRadio.textContent = "Es la correcta";
    filaRadio.appendChild(radio); filaRadio.appendChild(labelRadio);
    panel.appendChild(lab); panel.appendChild(inp); panel.appendChild(filaRadio);
  });

  const labEt = document.createElement("label"); labEt.textContent = "Etiquetas (separadas por comas)";
  const inpEt = document.createElement("input"); inpEt.value = pregunta ? (pregunta.etiquetas || []).join(", ") : "";
  panel.appendChild(labEt); panel.appendChild(inpEt);

  const labInfo = document.createElement("label"); labInfo.textContent = "Información complementaria (opcional)";
  const txtInfo = document.createElement("textarea"); txtInfo.value = pregunta ? (pregunta.info_extra || "") : "";
  panel.appendChild(labInfo); panel.appendChild(txtInfo);

  const labVisible = document.createElement("label"); labVisible.style.display = "flex"; labVisible.style.alignItems = "center"; labVisible.style.gap = "8px";
  const chkVisible = document.createElement("input"); chkVisible.type = "checkbox"; chkVisible.style.width = "auto";
  chkVisible.checked = pregunta ? pregunta.visible !== false : true;
  labVisible.appendChild(chkVisible);
  labVisible.appendChild(document.createTextNode("Visible en los tests"));
  panel.appendChild(labVisible);

  vista.appendChild(panel);

  const btnGuardar = document.createElement("button"); btnGuardar.className = "btn-primario";
  btnGuardar.textContent = pregunta ? "💾 Guardar cambios" : "💾 Crear pregunta";
  btnGuardar.onclick = async () => {
    const cuerpo = {
      id_examen: idExamen,
      texto_pregunta: txtP.value.trim(),
      respuestas: Object.fromEntries(letras.map(l => [l, inputsRespuesta[l].value.trim()])),
      correcta: correctaSeleccionada,
      visible: chkVisible.checked,
      etiquetas_texto: inpEt.value,
      info_extra: txtInfo.value.trim(),
    };
    if (pregunta) cuerpo.version_esperada = pregunta.version;
    await guardarPregunta(pregunta, cuerpo, idExamen);
  };
  vista.appendChild(btnGuardar);

  if (pregunta) {
    const btnBorrar = document.createElement("button"); btnBorrar.className = "btn-peligro"; btnBorrar.textContent = "🗑️ Eliminar pregunta";
    btnBorrar.onclick = async () => {
      if (!confirm("¿Eliminar esta pregunta?")) return;
      CACHE.preguntas = CACHE.preguntas.filter(p => p.id_pregunta !== pregunta.id_pregunta);
      guardarLS(LS_CACHE, CACHE);
      if (config.token) {
        try { await api(`/preguntas/${pregunta.id_pregunta}?version_esperada=${pregunta.version}`, "DELETE"); }
        catch (e) {
          if (e.tipo === "http" && e.status === 409) await mostrarConflicto({ tipo: "eliminar_pregunta", datos_id: pregunta.id_pregunta }, e.detalle);
          else encolar({ tipo: "eliminar_pregunta", datos_id: pregunta.id_pregunta, version_esperada: pregunta.version });
        }
      } else {
        encolar({ tipo: "eliminar_pregunta", datos_id: pregunta.id_pregunta, version_esperada: pregunta.version });
      }
      listaPreguntasExamen(idExamen);
    };
    vista.appendChild(btnBorrar);
  }

  const btnCancelar = document.createElement("button"); btnCancelar.className = "btn-secundario"; btnCancelar.textContent = "Cancelar";
  btnCancelar.onclick = () => listaPreguntasExamen(idExamen);
  vista.appendChild(btnCancelar);
}

async function guardarPregunta(preguntaExistente, cuerpo, idExamen) {
  const tipo = preguntaExistente ? "editar_pregunta" : "crear_pregunta";
  if (config.token) {
    try {
      const r = await api(
        preguntaExistente ? "/preguntas/" + preguntaExistente.id_pregunta : "/preguntas",
        preguntaExistente ? "PUT" : "POST",
        cuerpo
      );
      // actualiza la caché local con la version real que ha devuelto el servidor
      const nueva = {
        id_pregunta: r.id_pregunta,
        id_examen: idExamen,
        texto_pregunta: cuerpo.texto_pregunta,
        version: r.version,
        visible: cuerpo.visible,
        etiquetas: cuerpo.etiquetas_texto.split(",").map(t => t.trim()).filter(Boolean),
        info_extra: cuerpo.info_extra,
        respuestas: Object.entries(cuerpo.respuestas).map(([letra, texto]) => ({ letra, texto, correcta: letra === cuerpo.correcta })),
      };
      if (preguntaExistente) Object.assign(preguntaExistente, nueva);
      else CACHE.preguntas.push(nueva);
      guardarLS(LS_CACHE, CACHE);
    } catch (e) {
      if (e.tipo === "http" && e.status === 409) {
        await mostrarConflicto({ tipo, datos: cuerpo, datos_id: preguntaExistente ? preguntaExistente.id_pregunta : null }, e.detalle);
        listaPreguntasExamen(idExamen);
        return;
      }
      encolar({ tipo, datos: cuerpo, datos_id: preguntaExistente ? preguntaExistente.id_pregunta : "(pendiente-" + Date.now() + ")" });
    }
  } else {
    encolar({ tipo, datos: cuerpo, datos_id: preguntaExistente ? preguntaExistente.id_pregunta : "(pendiente-" + Date.now() + ")" });
  }
  listaPreguntasExamen(idExamen);
}

/* ============================================================
   AJUSTES / LOGIN
   ============================================================ */
function renderAjustes() {
  const vista = document.getElementById("vista-ajustes");
  vista.innerHTML = "";
  const panel = document.createElement("div"); panel.className = "panel";

  const labUrl = document.createElement("label"); labUrl.textContent = "URL de tu API (Render)";
  const inpUrl = document.createElement("input"); inpUrl.placeholder = "https://tu-api.onrender.com"; inpUrl.value = config.apiUrl;
  panel.appendChild(labUrl); panel.appendChild(inpUrl);

  if (config.token) {
    const info = document.createElement("p");
    info.textContent = `Conectado como ${config.usuario} (${config.rol})`;
    panel.appendChild(info);
    const btnSalir = document.createElement("button"); btnSalir.className = "btn-secundario"; btnSalir.textContent = "Cerrar sesión";
    btnSalir.onclick = () => { config.apiUrl = inpUrl.value.trim(); guardarLS(LS_CONFIG, config); cerrarSesion(); };
    panel.appendChild(btnSalir);
  } else {
    const labU = document.createElement("label"); labU.textContent = "Usuario";
    const inpU = document.createElement("input");
    const labC = document.createElement("label"); labC.textContent = "Contraseña";
    const inpC = document.createElement("input"); inpC.type = "password";
    panel.appendChild(labU); panel.appendChild(inpU); panel.appendChild(labC); panel.appendChild(inpC);

    const btnEntrar = document.createElement("button"); btnEntrar.className = "btn-primario"; btnEntrar.textContent = "Iniciar sesión";
    btnEntrar.onclick = async () => {
      config.apiUrl = inpUrl.value.trim().replace(/\/$/, "");
      guardarLS(LS_CONFIG, config);
      btnEntrar.textContent = "Conectando… (puede tardar hasta 1 min si la API estaba dormida)";
      btnEntrar.disabled = true;
      try {
        await iniciarSesion(inpU.value.trim(), inpC.value);
        await refrescarCache();
        renderAjustes();
        render();
      } catch (e) {
        alert(e.tipo === "http" ? "Usuario o contraseña incorrectos" : "No se pudo conectar. Comprueba la URL y tu conexión, o inténtalo de nuevo (la API puede tardar en despertar).");
        btnEntrar.textContent = "Iniciar sesión"; btnEntrar.disabled = false;
      }
    };
    panel.appendChild(btnEntrar);
  }
  vista.appendChild(panel);

  const btnActualizar = document.createElement("button"); btnActualizar.className = "btn-secundario"; btnActualizar.textContent = "🔄 Actualizar datos ahora";
  btnActualizar.onclick = async () => {
    try { await refrescarCache(); alert("Datos actualizados."); render(); }
    catch (e) { alert("Sin conexión: se sigue usando la última copia guardada."); }
  };
  vista.appendChild(btnActualizar);

  if (cola.length) {
    const btnSync = document.createElement("button"); btnSync.className = "btn-secundario"; btnSync.textContent = `📤 Sincronizar ${cola.length} cambio(s) pendiente(s)`;
    btnSync.onclick = sincronizar;
    vista.appendChild(btnSync);
  }
}

/* ============================================================
   NAVEGACIÓN ENTRE PESTAÑAS
   ============================================================ */
function mostrarTab(id) {
  ["vista-test", "vista-fallos", "vista-admin", "vista-ajustes"].forEach(v => document.getElementById(v).style.display = "none");
  ["tab-test", "tab-fallos", "tab-admin", "tab-ajustes"].forEach(t => document.getElementById(t).classList.remove("activo"));
  document.getElementById(id.replace("tab", "vista")).style.display = "block";
  document.getElementById(id).classList.add("activo");
  if (id === "tab-fallos") renderFallos();
  if (id === "tab-admin") renderAdmin();
  if (id === "tab-ajustes") renderAjustes();
}
document.getElementById("tab-test").onclick = () => mostrarTab("tab-test");
document.getElementById("tab-fallos").onclick = () => mostrarTab("tab-fallos");
document.getElementById("tab-admin").onclick = () => mostrarTab("tab-admin");
document.getElementById("tab-ajustes").onclick = () => mostrarTab("tab-ajustes");

/* ============================================================
   ARRANQUE
   ============================================================ */
if (config.rol === "admin") document.getElementById("tab-admin").style.display = "block";
actualizarAvisoPendientes();
render();
if (config.apiUrl && config.token) {
  sincronizar(); // intenta sincronizar pendientes y refrescar al abrir
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  });
}
